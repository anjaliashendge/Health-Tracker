<!DOCTYPE html>
<html>
<head>
    <title>Health Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #121212;
            color: white;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            height: 100%;
        }
        .card h2 {
            font-size: 2.5rem;
        }
        .status {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Health Dashboard</h1>

    <!-- DASHBOARD -->
    <div class="row g-4 text-center">

        <div class="col-md-4">
            <div class="card bg-primary p-4">
                <h3>Sleep</h3>
                <h2 id="sleep">0 hrs</h2>
                <p id="sleepStatus" class="status"></p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-success p-4">
                <h3>Water</h3>
                <h2 id="water">0 L</h2>
                <p id="waterStatus" class="status"></p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-warning text-dark p-4">
                <h3>Exercise</h3>
                <h2 id="exercise">0 min</h2>
            </div>
        </div>

    </div>

    <!-- FORM -->
    <div class="mt-5">
        <h3 class="text-center mb-3">Add Today's Data</h3>

        <div class="row g-3">

            <div class="col-md-3">
                <input type="number" id="sleepInput" class="form-control" placeholder="Sleep Hours">
            </div>

            <div class="col-md-3">
                <input type="number" id="waterInput" class="form-control" placeholder="Water (L)">
            </div>

            <div class="col-md-3">
                <input type="number" id="exerciseInput" class="form-control" placeholder="Exercise (min)">
            </div>

            <div class="col-md-3 d-grid">
                <button class="btn btn-light" onclick="addData()">Add Entry</button>
            </div>

        </div>
    </div>

</div>

<script>
async function loadData() {
    const res = await fetch('/api/health');
    const data = await res.json();

    if (data.length === 0) return;

    const latest = data[data.length - 1];

    document.getElementById("sleep").innerText = latest.sleepHours + " hrs";
    document.getElementById("water").innerText = latest.waterLiters + " L";
    document.getElementById("exercise").innerText = latest.exerciseMinutes + " min";

    document.getElementById("sleepStatus").innerText =
        latest.sleepHours >= 8 ? "Goal Met" : "Less Sleep";

    document.getElementById("waterStatus").innerText =
        latest.waterLiters >= 3 ? "Goal Met" : "Drink More Water";
}

async function addData() {
    const sleep = document.getElementById("sleepInput").value;
    const water = document.getElementById("waterInput").value;
    const exercise = document.getElementById("exerciseInput").value;

    const newEntry = {
        date: new Date().toISOString(),
        sleepHours: parseFloat(sleep),
        waterLiters: parseFloat(water),
        exerciseMinutes: parseInt(exercise)
    };

    await fetch('/api/health', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(newEntry)
    });

    loadData();
}

loadData();
</script>

</body>
</html>
